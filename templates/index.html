<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Counter</title>
  <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    body {
        min-height: 100vh;
        background-color: #f0f4f8;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .header-container {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .main-header {
        color: #004b5a;
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 2px;
    }
    .counter-card {
        background-color: #004b5a;
        color: #ffffff;
        width: 100%;
        max-width: 420px;
        padding: 60px 40px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 75, 90, 0.15);
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow: hidden;
    }

    .counter-card::before {
        content: '';
        position: absolute;
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, rgba(26, 147, 161, 0.4) 0%, transparent 60%);
        top: -120px;
        left: -120px;
        z-index: 0;
    }

    .content-wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    .title {
        font-size: 24px;
        font-weight: 300;
        letter-spacing: 4px;
        margin-bottom: 40px;
        text-transform: uppercase;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        text-align: center;
    }

    .circle-display {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        border: 5px solid #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 50px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 10px 20px rgba(0, 0, 0, 0.1);
        background-color: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(5px);
    }

    #count {
        font-size: 80px;
        font-weight: bold;
        text-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    #inc {
        background-color: #ffffff;
        color: #004b5a;
        border: none;
        padding: 18px 0;
        width: 100%;
        max-width: 250px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    #inc:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        background-color: #f8f9fa;
    }
    
    #inc:active {
        transform: translateY(2px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
    }

    .footer-container {
        margin-top: -10px;
    }

    .github-link {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #6a7c8a;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    .github-link:hover {
        color: #004b5a;
    }

    .github-icon {
        width: 24px;
        height: 24px;
        fill: currentColor;
    }
  </style>
</head>
<body>
  <!-- Nagłówek z tytułem -->
  <div class="header-container">
        <h1 class="main-header">COUNTER DEMO</h1>
  </div>
  <!-- Licznik -->
  <div class="counter-card">
        <div class="content-wrapper">
            <h1 class="title">Current count:</h1>
            
            <div class="circle-display">
                <div id="count">...</div>
            </div>
            
            <button id="inc">Increment</button>
        </div>
  </div>
  <!-- Link do githuba -->
  <div class="footer-container">
        <a href="https://github.com/skill3472/ProjektChmuraVistula2026" target="_blank" class="github-link">
            <svg class="github-icon" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
        </a>
  </div>

  <script>
    async function fetchCount() {
      try {
        const res = await fetch('/counter');
        const data = await res.json();
        document.getElementById('count').textContent = data.value;
      } catch (error) {
        console.error("Failed to fetch count:", error);
      } finally {
        setTimeout(fetchCount, 2000);
      }
    }

    async function increment() {
      const res = await fetch('/counter/increment', {method: 'POST'});
      const data = await res.json();
      document.getElementById('count').textContent = data.value;
    }

    document.getElementById('inc').onclick = increment;

    fetchCount();
  </script>
</body>
</html>
